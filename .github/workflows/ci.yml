name: CI
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Build debug APK
        run: ./gradlew assembleDebug
      - name: Fail if Play Services leaked in
        run: |
          if ./gradlew :app:dependencies | grep -q 'com.google.android.gms'; then
            echo "::error::Google Play Services detected. Головное устройство их не имеет."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ehat-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
